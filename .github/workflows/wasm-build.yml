name: Build Tessera FEA WASM

# Phase 3 (build spec §2.2/§11): compile the Tessera FEA engines to WebAssembly
# with the Emscripten SDK and publish the `.wasm` + ES6 JS glue as a build
# artifact. The native OpenSees build (build_cmake.yml) is untouched.
#
# Two modules are built (both pure C++, NO Fortran/LAPACK/ARPACK/MUMPS — see
# docs/PHASE3_SPIKE.md):
#   - feaEngine.{mjs,wasm}      production: OpenSees subset (StaticAnalysis +
#                               ProfileSPDLinDirectSolver)
#   - feaEngineEigen.{mjs,wasm} oracle: self-contained Eigen direct-stiffness
#
# This is a REUSABLE workflow: web-deploy.yml calls it (workflow_call) so the
# deployed app always ships freshly built, smoke-tested modules. It also runs
# standalone on pushes that touch the FEA sources, and on demand.

on:
  push:
    branches: [master]
    paths:
      - 'tessera/fea/**'
      - '.github/workflows/wasm-build.yml'
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        description: Name of the uploaded WASM artifact.
        value: tessera-fea-wasm

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Eigen headers (build-time dependency, not vendored)
        run: bash tessera/fea/fetch-eigen.sh

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Build production engine — OpenSees subset (.wasm + ES6 glue)
        run: bash tessera/fea/opensees/build-opensees.sh

      - name: Build oracle engine — Eigen (.wasm + ES6 glue)
        run: bash tessera/fea/build.sh

      - name: Smoke test production (Node — closed-form parity & equilibrium)
        run: node tessera/fea/test/smoke.mjs tessera/public/fea/feaEngine.mjs

      - name: Smoke test oracle (Node — closed-form parity & equilibrium)
        run: node tessera/fea/test/smoke.mjs tessera/public/fea/feaEngineEigen.mjs

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessera-fea-wasm
          path: tessera/public/fea/feaEngine*
          if-no-files-found: error
          retention-days: 7
