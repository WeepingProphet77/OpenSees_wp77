name: Deploy Tessera to GitHub Pages

# Builds the Tessera web app (in /tessera) and deploys it to GitHub Pages.
#
# Requirements (one-time, in repo Settings):
#   - Actions must be ENABLED on this fork.
#   - Pages → Build and deployment → Source = "GitHub Actions".
#
# The native OpenSees build/tests keep their own workflow; this one only touches
# the /tessera subdirectory. The FEA WebAssembly module is built by the reusable
# wasm-build.yml workflow and consumed here, so the deployed app ships it (the
# app stays fully usable for sectional design even if the module is absent).

on:
  push:
    branches: [master]
    paths:
      - 'tessera/**'
      - '.github/workflows/web-deploy.yml'
      - '.github/workflows/wasm-build.yml'
  pull_request:
    paths:
      - 'tessera/**'
      - '.github/workflows/web-deploy.yml'
      - '.github/workflows/wasm-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the FEA WASM module (+ Node smoke test) and publish it as an artifact.
  wasm:
    uses: ./.github/workflows/wasm-build.yml

  build:
    needs: wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tessera
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tessera/package-lock.json

      # Place the freshly built WASM module where Vite serves it from (public/fea).
      # This also lets the Vitest numeric parity tests run against the real module.
      - name: Download FEA WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: tessera-fea-wasm
          path: tessera/public/fea

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: tessera/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
