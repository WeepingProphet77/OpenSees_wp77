name: Deploy Tessera to GitHub Pages

# Builds the Tessera web app (in /tessera) and deploys it to GitHub Pages.
#
# Requirements (one-time, in repo Settings):
#   - Actions must be ENABLED on this fork.
#   - Pages → Build and deployment → Source = "GitHub Actions".
#
# The native OpenSees build/tests keep their own workflow; this one only touches
# the /tessera subdirectory.

on:
  push:
    branches: [master]
    paths:
      - 'tessera/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tessera
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tessera/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tessera/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
